<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 날씨 AI 비서</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-icon">🌤️</div>
            <p class="header-subtitle">실시간 기상청 데이터와 제미나이 AI가 만나 날씨를 친절하게 알려드려요.</p>
        </header>

        <!-- 상단 날씨 및 코디 카드 -->
        <div class="weather-card">
            <div id="weather-icons-container" class="weather-icons-container">
                <div id="weather-icon" class="weather-status-icon">⏳</div>
                <div id="top-icon" class="weather-status-icon" style="display:none;"></div>
                <div id="bottom-icon" class="weather-status-icon" style="display:none;"></div>
            </div>
            <h2 id="weather-summary" class="weather-summary-text">현재 날씨를 분석 중입니다...</h2>

            <div class="action-buttons">
                <button type="button" class="btn btn-schedule">📅 스케줄 피드백 받기</button>
                <button type="button" class="btn btn-music">🎵 추천 음악 보기</button>
            </div>
        </div>

        <!-- 하단 채팅 및 입력 영역 -->
        <div class="chat-section">
            <div id="chat-history" class="chat-history">

                <!-- 💡 수정한 첫 AI 메시지 레이아웃 (들여쓰기 공백 완벽 제거) -->
                <div class="message-row ai">
                    <div class="avatar">🤖</div>
                    <div class="chat-bubble">안녕하세요, 체이스! 궁금한 지역의 날씨를 물어보세요.<br>예: "서울 마포구 합정동 날씨 알려줘" 또는 "부산 해운대 지금 비
                        와?"</div>
                </div>

            </div>

            <!-- 하단 지역 선택 칩 -->
            <div id="chip-group" class="chip-group">
                <button type="button" class="chip location-chip">📍 서울 마포구</button>
                <button type="button" class="chip location-chip">📍 부산 해운대</button>
                <button type="button" class="chip location-chip">📍 제주 제주시</button>
            </div>

            <form id="chat-form" class="input-form">
                <div class="input-container">
                    <input type="text" id="user-input" placeholder="동네 이름과 함께 질문을 입력해 주세요..." autocomplete="off"
                        required>
                    <button type="submit" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
